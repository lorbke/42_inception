services:
  mariadb:
    build: requirements/mariadb/
    image: mariadb
    container_name: mariadb
    restart: always
    init: true #adds tini as PID 1
    environment:
      DB_NAME: ${DB_NAME}
      DB_ROOT: ${DB_ROOT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_volume:/var/lib/mysql/
    networks:
      - inception

  wordpress:
    build: requirements/wordpress/
    image: wordpress
    container_name: wordpress
    depends_on:
      - mariadb
    restart: always
    init: true
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DOMAIN_NAME: ${DOMAIN_NAME}
      WP_ADMIN: ${WP_ADMIN}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WP_USER: ${WP_USER}
      WP_USER_PASSWORD: ${WP_USER_PASSWORD}
      WP_USER_EMAIL: ${WP_USER_EMAIL}
    volumes:
      - wp_volume:/var/www/html
    networks:
      - inception

  nginx:
    build: requirements/nginx/
    image: nginx
    container_name: nginx
    depends_on:
      - wordpress
    restart: always
    init: true
    ports:
      - "443:443"
    volumes:
      - wp_volume:/var/www/html
    networks:
      - inception

  redis:
    build: bonus/redis/
    image: redis
    container_name: redis
    depends_on:
      - wordpress
    restart: always
    init: true
    networks:
      - inception

  ftp:
    build: bonus/ftp/
    image: ftp
    container_name: ftp
    depends_on:
      - wordpress
    restart: always
    init: true
    environment:
      FTP_USER: ${FTP_USER}
      FTP_PASSWORD: ${FTP_PASSWORD}
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    volumes:
      - wp_volume:/var/www/html
    networks:
      - inception

  website:
    build: bonus/website/
    image: website
    container_name: website
    restart: always
    init: true
    ports:
      - "3000:3000"

  adminer:
    build: bonus/adminer/
    image: adminer
    container_name: adminer
    depends_on:
      - mariadb
    restart: always
    init: true
    ports:
      - "8080:8080"
    networks:
      - inception

  glances:
    build: bonus/glances/
    image: glances
    container_name: glances
    restart: always
    init: true
    ports:
      - "61208:61208"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - inception

volumes:
  db_volume:
    driver_opts:
      type: none
      o: bind
      device: "${VOLUME_PATH}/mariadb"
  wp_volume:
    driver_opts:
      type: none
      o: bind
      device: "${VOLUME_PATH}/wordpress"

networks:
  inception: