services:
  mariadb:
    build: requirements/mariadb/
    container_name: mariadb
    restart: always
    init: true #adds tini as PID 1
    environment:
      DB_NAME: ${DB_NAME}
      DB_ROOT: ${DB_ROOT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_volume:/var/lib/mysql/
    networks:
      - inception

  wordpress:
    build: requirements/wordpress/
    container_name: wordpress
    depends_on:
      - mariadb
    restart: always
    init: true
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DOMAIN_NAME: ${DOMAIN_NAME}
      WP_ADMIN: ${WP_ADMIN}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WP_USER: ${WP_USER}
      WP_USER_PASSWORD: ${WP_USER_PASSWORD}
      WP_USER_EMAIL: ${WP_USER_EMAIL}
    ports:
      - "9000:9000"
    volumes:
      - wp_volume:/var/www/
    networks:
      - inception

  nginx:
    build: requirements/nginx/
    container_name: nginx
    depends_on:
      - wordpress
    restart: always
    init: true
    ports:
      - "443:443"
    volumes:
      - wp_volume:/var/www/
    networks:
      - inception

  redis:
    build: bonus/redis/
    container_name: redis
    depends_on:
      - wordpress
    restart: always
    init: true
    networks:
      - inception

volumes:
  db_volume:
    driver_opts:
      type: none
      o: bind
      device: "${VOLUME_PATH}/mariadb"
  wp_volume:
    driver_opts:
      type: none
      o: bind
      device: "${VOLUME_PATH}/wordpress"

networks:
  inception: